services:
  cloudflared:
    image: cloudflare/cloudflared:2025.1.0
    container_name: sub2api-cloudflared
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN:?CF_TUNNEL_TOKEN is required}
      - NO_AUTOUPDATE=true
    depends_on:
      sub2api:
        condition: service_healthy
    networks:
      - sub2api-network
    # For credentials.json mode instead of token:
    # command: tunnel --config /etc/cloudflared/config.yml run
    # volumes:
    #   - ./cloudflared:/etc/cloudflared:ro

networks:
  sub2api-network:
    external: true
    name: deploy_sub2api-network
