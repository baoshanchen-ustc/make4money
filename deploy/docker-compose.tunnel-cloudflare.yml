services:
  cloudflared:
    image: cloudflare/cloudflared:2025.1.0
    container_name: sub2api-cloudflared
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN:?CF_TUNNEL_TOKEN is required}
      - NO_AUTOUPDATE=true
    depends_on:
      sub2api:
        condition: service_healthy
    networks:
      - frontend-network
    healthcheck:
      test: ["CMD", "cloudflared", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3
