name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  IMAGE: asia-east1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.SERVICE_NAME }}/${{ vars.SERVICE_NAME }}

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "image_tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      # ── GCP Auth (Workload Identity Federation) ──
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}
          token_format: access_token

      # ── Build & Push to Artifact Registry ──
      - uses: docker/login-action@v3
        with:
          registry: asia-east1-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            COMMIT=${{ github.sha }}
            GOPROXY=https://proxy.golang.org,direct
            GOSUMDB=sum.golang.org
          tags: |
            ${{ env.IMAGE }}:${{ steps.meta.outputs.image_tag }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Deploy to Cloud Run ──
      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ vars.SERVICE_NAME }} \
            --image=${{ env.IMAGE }}:${{ steps.meta.outputs.image_tag }} \
            --region=${{ vars.GCP_REGION }} \
            --project=${{ vars.GCP_PROJECT_ID }}

      - name: Summary
        run: |
          echo "## Deploy Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Image** | \`${{ env.IMAGE }}:${{ steps.meta.outputs.image_tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Service** | ${{ vars.SERVICE_NAME }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Region** | ${{ vars.GCP_REGION }} |" >> "$GITHUB_STEP_SUMMARY"
